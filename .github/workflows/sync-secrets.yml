# Reusable 1Password -> GitHub secrets sync workflow
#
# Runs `supa-sync-1password-to-github` (packages/scripts/src/sync-1password-to-github.sh)
# to copy secrets from a 1Password vault into GitHub Environment secrets
# (staging / production). See docs/SECRETS.md for the full model: 1Password
# is the source of truth, GitHub secrets are the buffer deploy workflows read
# from, and syncing only happens on-demand or when the caller's allowlist
# file changes — never on every push (1Password rate-limits reads).
#
# Called by consumer repos via:
#   `uses: Supa-Media/supa-framework/.github/workflows/sync-secrets.yml@main`
#
# The caller decides *when* this runs — typically a thin wrapper workflow
# with `workflow_dispatch` for manual rotations, plus a `push: paths:` trigger
# scoped to its allowlist file so a merge that adds/removes a secret key
# re-syncs automatically (see Togather's/Fount's former sync-secrets.yml for
# the pattern this generalizes).

name: Sync Secrets

on:
  workflow_call:
    inputs:
      vault:
        description: "1Password vault name (e.g. 'Togather', 'Studios')"
        type: string
        required: true
      allowlist-path:
        description: "Path (relative to the caller repo root) to the secrets allowlist JSON file — see supa-sync-1password-to-github --help for the schema"
        type: string
        required: true
      environment:
        description: "Target environment: staging, production, or both"
        type: string
        required: true
      dry-run:
        description: "Show what would be synced without making changes"
        type: boolean
        default: false
      node-version:
        description: "Node.js version (used only to parse the allowlist JSON — no jq dependency)"
        type: string
        default: "22"
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN:
        description: "1Password service account token, scoped to the target vault"
        required: false
      GH_ADMIN_TOKEN:
        description: "GitHub PAT with repo admin scope (secrets:write) — the default GITHUB_TOKEN cannot manage repository/environment secrets"
        required: false
      packages-token:
        description: "Token for installing @supa-media/scripts from GitHub Packages, for callers whose default GITHUB_TOKEN can't read them (e.g. cross-org). Falls back to the workflow's own token."
        required: false

# Never let two syncs of the same vault/environment race (e.g. a manual
# dispatch overlapping an on-merge run).
concurrency:
  group: sync-secrets-${{ inputs.vault }}-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  # A GitHub Actions job can bind at most one `environment:`, and only a job
  # WITH an `environment:` binding can see that environment's GitHub
  # Environment secrets (`secrets: inherit` on the calling `uses:` job does
  # NOT substitute for this — see docs/SECRETS.md). The `sync` job below
  # needs `environment: <name>` set to a real GitHub Environment
  # ("staging"/"production") to read environment-scoped secrets like a
  # per-environment OP_SERVICE_ACCOUNT_TOKEN, but this workflow's `environment`
  # input also accepts "both" — which isn't a real GitHub Environment and
  # can't be bound. This `setup` job resolves that: it turns the input into
  # a JSON array (`["staging"]`, `["production"]`, or `["staging","production"]`
  # for "both") that the `sync` job's `strategy.matrix` fans out over,
  # binding exactly one real environment per matrix leg. (Named `setup`, not
  # `matrix`, so it doesn't collide in name with the `matrix` context the
  # `sync` job below reads from -- `needs.setup.outputs` vs. `matrix.environment`
  # are unrelated, but sharing the word would make that harder to read.)
  setup:
    name: Compute environment matrix
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.compute.outputs.environments }}
    steps:
      - name: Compute environment list
        id: compute
        run: |
          if [ "${{ inputs.environment }}" = "both" ]; then
            echo 'environments=["staging","production"]' >> "$GITHUB_OUTPUT"
          else
            echo 'environments=["${{ inputs.environment }}"]' >> "$GITHUB_OUTPUT"
          fi

  sync:
    name: Sync ${{ matrix.environment }} secrets (${{ inputs.vault }})
    needs: setup
    strategy:
      # Each environment syncs independently now (previously a single job
      # looped both environments and aborted BOTH atomically if either had a
      # missing-required secret or a 1Password read error — see
      # sync-1password-to-github.sh's phase-1/phase-2 design). That
      # cross-environment atomicity is a necessary trade-off of the fix: a
      # job can only bind one GitHub Environment, so "both" now means two
      # independent jobs. `fail-fast: false` keeps them independent in
      # practice too — a failed staging sync must not cancel an
      # in-flight/pending production sync (a job with its own `environment:`
      # binding is still all-or-nothing WITHIN that one environment; the
      # script's phase-1/phase-2 guarantee is unchanged per-environment).
      fail-fast: false
      matrix:
        environment: ${{ fromJson(needs.setup.outputs.environments) }}
    # Binding the real GitHub Environment (not "both") is what makes this
    # job's environment-scoped secrets (e.g. a per-environment
    # OP_SERVICE_ACCOUNT_TOKEN) visible to `secrets.*` below. A job WITH an
    # `environment:` binding still sees repo-level secrets too, so callers
    # that keep OP_SERVICE_ACCOUNT_TOKEN/GH_ADMIN_TOKEN as repo-level secrets
    # (as documented for "both" callers before this fix) keep working
    # unchanged.
    environment: ${{ matrix.environment }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: "https://npm.pkg.github.com"
          scope: "@supa-media"

      - name: Sync secrets to GitHub
        env:
          # `secrets.packages-token` lets cross-org callers supply a token that can
          # read this org's packages; otherwise `github.token` (not
          # `secrets.GITHUB_TOKEN`, which is empty inside a reusable workflow)
          # authenticates npm to GitHub Packages (@supa-media/*, private).
          NODE_AUTH_TOKEN: ${{ secrets.packages-token || github.token }}
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "Error: no token available to install @supa-media/scripts from GitHub Packages"
            echo "This should never be empty (it falls back to the workflow's own github.token) —"
            echo "if you're seeing this, pass a packages-token secret explicitly for this caller."
            exit 1
          fi
          if [ -z "$OP_SERVICE_ACCOUNT_TOKEN" ]; then
            echo "Error: OP_SERVICE_ACCOUNT_TOKEN secret is not set"
            exit 1
          fi
          if [ -z "$GH_TOKEN" ]; then
            echo "Error: GH_ADMIN_TOKEN secret is not set"
            echo "Create a GitHub PAT with repo admin scope and store it as GH_ADMIN_TOKEN"
            exit 1
          fi

          # Always a single environment here — the matrix job already split
          # "both" into separate legs, so the script never needs its own
          # --all flag in this call site.
          ARGS=(--vault "${{ inputs.vault }}" --allowlist "${{ inputs.allowlist-path }}" --environment "${{ matrix.environment }}")
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            ARGS+=(--dry-run)
          fi

          npx --yes --package=@supa-media/scripts supa-sync-1password-to-github "${ARGS[@]}"

      - name: Verify synced secrets
        if: ${{ !inputs.dry-run }}
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
        run: |
          echo "=== Verifying synced secrets (${{ matrix.environment }}) ==="
          gh secret list --env "${{ matrix.environment }}"

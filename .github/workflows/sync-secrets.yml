# Reusable 1Password -> GitHub secrets sync workflow
#
# Runs `supa-sync-1password-to-github` (packages/scripts/src/sync-1password-to-github.sh)
# to copy secrets from a 1Password vault into GitHub Environment secrets
# (staging / production). See docs/SECRETS.md for the full model: 1Password
# is the source of truth, GitHub secrets are the buffer deploy workflows read
# from, and syncing only happens on-demand or when the caller's allowlist
# file changes — never on every push (1Password rate-limits reads).
#
# Called by consumer repos via:
#   `uses: Supa-Media/supa-framework/.github/workflows/sync-secrets.yml@main`
#
# The caller decides *when* this runs — typically a thin wrapper workflow
# with `workflow_dispatch` for manual rotations, plus a `push: paths:` trigger
# scoped to its allowlist file so a merge that adds/removes a secret key
# re-syncs automatically (see Togather's/Fount's former sync-secrets.yml for
# the pattern this generalizes).

name: Sync Secrets

on:
  workflow_call:
    inputs:
      vault:
        description: "1Password vault name (e.g. 'Togather', 'Studios')"
        type: string
        required: true
      allowlist-path:
        description: "Path (relative to the caller repo root) to the secrets allowlist JSON file — see supa-sync-1password-to-github --help for the schema"
        type: string
        required: true
      environment:
        description: "Target environment: staging, production, or both"
        type: string
        required: true
      dry-run:
        description: "Show what would be synced without making changes"
        type: boolean
        default: false
      node-version:
        description: "Node.js version (used only to parse the allowlist JSON — no jq dependency)"
        type: string
        default: "22"
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN:
        description: "1Password service account token, scoped to the target vault"
        required: false
      GH_ADMIN_TOKEN:
        description: "GitHub PAT with repo admin scope (secrets:write) — the default GITHUB_TOKEN cannot manage repository/environment secrets"
        required: false
      packages-token:
        description: "Token for installing @supa-media/scripts from GitHub Packages, for callers whose default GITHUB_TOKEN can't read them (e.g. cross-org). Falls back to the workflow's own token."
        required: false

# Never let two syncs of the same vault/environment race (e.g. a manual
# dispatch overlapping an on-merge run).
concurrency:
  group: sync-secrets-${{ inputs.vault }}-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  sync:
    name: Sync ${{ inputs.environment }} secrets (${{ inputs.vault }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: "https://npm.pkg.github.com"
          scope: "@supa-media"

      - name: Sync secrets to GitHub
        env:
          # `secrets.packages-token` lets cross-org callers supply a token that can
          # read this org's packages; otherwise `github.token` (not
          # `secrets.GITHUB_TOKEN`, which is empty inside a reusable workflow)
          # authenticates npm to GitHub Packages (@supa-media/*, private).
          NODE_AUTH_TOKEN: ${{ secrets.packages-token || github.token }}
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "Error: no token available to install @supa-media/scripts from GitHub Packages"
            echo "This should never be empty (it falls back to the workflow's own github.token) —"
            echo "if you're seeing this, pass a packages-token secret explicitly for this caller."
            exit 1
          fi
          if [ -z "$OP_SERVICE_ACCOUNT_TOKEN" ]; then
            echo "Error: OP_SERVICE_ACCOUNT_TOKEN secret is not set"
            exit 1
          fi
          if [ -z "$GH_TOKEN" ]; then
            echo "Error: GH_ADMIN_TOKEN secret is not set"
            echo "Create a GitHub PAT with repo admin scope and store it as GH_ADMIN_TOKEN"
            exit 1
          fi

          ARGS=(--vault "${{ inputs.vault }}" --allowlist "${{ inputs.allowlist-path }}")
          if [ "${{ inputs.environment }}" = "both" ]; then
            ARGS+=(--all)
          else
            ARGS+=(--environment "${{ inputs.environment }}")
          fi
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            ARGS+=(--dry-run)
          fi

          npx --yes --package=@supa-media/scripts supa-sync-1password-to-github "${ARGS[@]}"

      - name: Verify synced secrets
        if: ${{ !inputs.dry-run }}
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
        run: |
          echo "=== Verifying synced secrets ==="
          if [ "${{ inputs.environment }}" = "both" ] || [ "${{ inputs.environment }}" = "staging" ]; then
            echo ""
            echo "Staging secrets:"
            gh secret list --env staging
          fi
          if [ "${{ inputs.environment }}" = "both" ] || [ "${{ inputs.environment }}" = "production" ]; then
            echo ""
            echo "Production secrets:"
            gh secret list --env production
          fi
